services:
  postgres:
    image: postgres:17
    container_name: norush-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: norush
      POSTGRES_PASSWORD: dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    container_name: norush-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:dev@postgres:5432/norush
      NORUSH_MASTER_KEY: ${NORUSH_MASTER_KEY:-dev-master-key-change-me}
      ORIGIN: ${ORIGIN:-http://localhost:3000}

  worker:
    build: .
    container_name: norush-worker
    restart: unless-stopped
    command: ["node", "packages/core/dist/worker.js"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:dev@postgres:5432/norush
      NORUSH_MASTER_KEY: ${NORUSH_MASTER_KEY:-dev-master-key-change-me}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    stop_grace_period: 30s

volumes:
  pgdata:
