# Deploy norush to Azure Container Apps
#
# Triggers after the CI workflow completes successfully on main.
# Builds the Docker image, pushes to Azure Container Registry (ACR),
# and deploys both the web and worker containers.
#
# Required GitHub repository secrets:
#   AZURE_CREDENTIALS        — JSON output of `az ad sp create-for-rbac`
#   ACR_LOGIN_SERVER          — e.g. norush.azurecr.io
#   ACR_USERNAME              — ACR admin or service principal username
#   ACR_PASSWORD              — ACR admin or service principal password
#   AZURE_RESOURCE_GROUP      — Resource group containing the Container Apps
#   AZURE_CONTAINER_APP_WEB   — Name of the web Container App (e.g. norush-web)
#   AZURE_CONTAINER_APP_WORKER — Name of the worker Container App (e.g. norush-worker)

name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch: # Allow manual triggers for rollback / redeploy

concurrency:
  group: deploy-production
  cancel-in-progress: false # Never cancel an in-progress deploy

jobs:
  # -----------------------------------------------------------------------
  # 0. Check whether Azure credentials are configured
  # -----------------------------------------------------------------------
  check-credentials:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      has-azure: ${{ steps.check.outputs.has-azure }}
    steps:
      - name: Check for Azure credentials
        id: check
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          AZURE_CONTAINER_APP_WEB: ${{ secrets.AZURE_CONTAINER_APP_WEB }}
          AZURE_CONTAINER_APP_WORKER: ${{ secrets.AZURE_CONTAINER_APP_WORKER }}
        run: |
          if [ -n "$ACR_LOGIN_SERVER" ] && \
             [ -n "$ACR_USERNAME" ] && \
             [ -n "$ACR_PASSWORD" ] && \
             [ -n "$AZURE_CREDENTIALS" ] && \
             [ -n "$AZURE_RESOURCE_GROUP" ] && \
             [ -n "$AZURE_CONTAINER_APP_WEB" ] && \
             [ -n "$AZURE_CONTAINER_APP_WORKER" ]; then
            echo "has-azure=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-azure=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping deploy — Azure deployment secrets are incomplete. Set ACR_LOGIN_SERVER, ACR_USERNAME, ACR_PASSWORD, AZURE_CREDENTIALS, AZURE_RESOURCE_GROUP, AZURE_CONTAINER_APP_WEB, and AZURE_CONTAINER_APP_WORKER secrets to enable deployment."
          fi

  # -----------------------------------------------------------------------
  # 1. Build and push Docker image to ACR
  # -----------------------------------------------------------------------
  build-and-push:
    needs: check-credentials
    # Only deploy when CI succeeded and Azure credentials are available.
    # The CI check is skipped for manual workflow_dispatch triggers.
    if: >-
      needs.check-credentials.outputs.has-azure == 'true' &&
      (github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate image tag
        id: meta
        run: |
          TAG="sha-${GITHUB_SHA::8}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/norush:${{ steps.meta.outputs.tag }}
            ${{ secrets.ACR_LOGIN_SERVER }}/norush:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -----------------------------------------------------------------------
  # 2. Deploy web container
  # -----------------------------------------------------------------------
  deploy-web:
    runs-on: ubuntu-latest
    needs: [check-credentials, build-and-push]
    if: needs.check-credentials.outputs.has-azure == 'true'
    environment: production
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy web container
        uses: azure/container-apps-deploy@v1
        with:
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppName: ${{ secrets.AZURE_CONTAINER_APP_WEB }}
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/norush:${{ needs.build-and-push.outputs.image-tag }}

  # -----------------------------------------------------------------------
  # 3. Deploy worker container
  # -----------------------------------------------------------------------
  deploy-worker:
    runs-on: ubuntu-latest
    needs: [check-credentials, build-and-push]
    if: needs.check-credentials.outputs.has-azure == 'true'
    environment: production
    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy worker container
        uses: azure/container-apps-deploy@v1
        with:
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppName: ${{ secrets.AZURE_CONTAINER_APP_WORKER }}
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/norush:${{ needs.build-and-push.outputs.image-tag }}

  # -----------------------------------------------------------------------
  # 4. Verify deployment
  # -----------------------------------------------------------------------
  verify:
    runs-on: ubuntu-latest
    needs: [check-credentials, deploy-web, deploy-worker]
    if: needs.check-credentials.outputs.has-azure == 'true'
    steps:
      - name: Wait for containers to start
        run: sleep 30

      - name: Health check
        run: |
          HEALTH_URL="${{ vars.DEPLOY_URL || 'https://norush.roubtec.com/' }}/api/health"
          echo "Checking $HEALTH_URL ..."

          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "$HEALTH_URL" || true)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 15s..."
            sleep 15
          done

          echo "Health check failed after 5 attempts"
          exit 1
